name: build

# Reusable workflow: build tea against a given Greenplum fork and upload the
# runtime artifacts. Called by ci.yml once per fork (arenadata + open-gpdb).
on:
  workflow_call:
    inputs:
      gpdb_repo:
        description: Git URL of the Greenplum fork to build
        required: true
        type: string
      gpdb_ref:
        description: Branch or tag of the Greenplum fork
        required: true
        type: string
      cache_key:
        description: actions/cache key for the installed dependencies (~/local)
        required: true
        type: string
      artifact_name:
        description: Name of the uploaded runtime artifact
        required: true
        type: string
      open_gpdb:
        description: Apply the open-gpdb-specific build fixups and checks
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear cache
        run: bash ci/clear-runner-cache.sh

      - name: Install dependencies
        run: bash ci/install-build-deps.sh

      - name: Prepare directories
        run: bash ci/prepare-dirs.sh

      - name: Cache installed dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/local
          key: ${{ inputs.cache_key }}

      - name: Cache Arrow third-party downloads
        id: cache-arrow-thirdparty
        uses: actions/cache@v4
        with:
          path: build/arrow-thirdparty
          key: arrow-thirdparty-15.0.2

      - name: Free disk space
        if: inputs.open_gpdb
        run: bash ci/free-disk-space.sh

      - name: Install Debian packages
        run: |
          TARGET_DIR="$HOME/local/gpdb"
          EXPECTED_SCRIPT="greenplum_path.sh"
          TEMP_DIR="$HOME/local/gp_temp_install"
          
          if [ "${{ inputs.open_gpdb }}" == "true" ]; then
            PACKAGE_URL="https://github.com/open-gpdb/gpdb/releases/download/6.29.9/greenplum-db-6_6.29.9-1-yandex.54459.ae09c99827_amd64.deb"
            echo "Installing open-gpdb..."
          else
            PACKAGE_URL="https://github.com/GreengageDB/greengage/releases/download/6.29.2/greengage6.deb"
            echo "Installing Greengage..."
          fi

          mkdir -p "$TEMP_DIR"
          wget -q "$PACKAGE_URL" -O /tmp/gp.deb
          sudo apt-get remove -y python-is-python3 || true
          sudo dpkg -x /tmp/gp.deb "$TEMP_DIR"
          rm -f /tmp/gp.deb

          REAL_SOURCE=$(find "$TEMP_DIR" -type d -exec test -f {}/"$EXPECTED_SCRIPT" \; -print -quit 2>/dev/null)
          if [ -z "$REAL_SOURCE" ]; then
            FOUND_SCRIPT=$(find "$TEMP_DIR" -type f -name "*_path.sh" | head -n 1)
            [ -n "$FOUND_SCRIPT" ] && REAL_SOURCE=$(dirname "$FOUND_SCRIPT") && EXPECTED_SCRIPT=$(basename "$FOUND_SCRIPT")
          fi

          if [ -z "$REAL_SOURCE" ]; then
            echo "ERROR: Installation directory not found" >&2; exit 1
          fi

          sudo rm -rf "$TARGET_DIR"
          sudo mv "$REAL_SOURCE" "$TARGET_DIR"
          sudo rm -rf "$TEMP_DIR"

          sudo chown -R "$USER:$USER" "$TARGET_DIR"

          if [ "$(basename "$EXPECTED_SCRIPT")" != "greenplum_path.sh" ]; then
             ln -s "$EXPECTED_SCRIPT" "$TARGET_DIR/greenplum_path.sh"
          fi

          source "$TARGET_DIR/greenplum_path.sh"
          echo "Greenplum ready at: $GPHOME"

      - name: Build and install Arrow 15
        run: bash ci/build-arrow.sh

      - name: Build and install gRPC
        run: bash ci/build-grpc.sh

      - name: Build Tea
        run: bash ci/build-tea.sh

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Pack runtime artifacts
        run: bash ci/pack-artifacts.sh

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ci-artifacts
          retention-days: 1
